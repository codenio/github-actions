name: 01 - Building Blocks
on:
  - push
  - workflow_dispatch
jobs:
  echo-hello:
    runs-on: ubuntu-latest
    steps:
      - name: Echo Hello
        run: echo "Hello, world!"
  echo-goodbye:
    runs-on: ubuntu-latest
    steps:
      - name: Failed step
        run: "exit 1"
      - name: Say goodbye
        run: echo "Goodbye!" 
